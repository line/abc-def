<div class="accordion" data-demo-accordion data-type="single">
  <div class="accordion-item" data-accordion-item>
    <button class="accordion-trigger" type="button" data-accordion-trigger aria-expanded="true" data-state="open">
      How do I reset my password?
      <svg class="demo-icon" data-slot="accordion-trigger-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
    </button>
    <div class="accordion-content demo-accordion-copy" data-accordion-content data-state="open">
      Click <strong>Forgot Password</strong> on the login page and follow the reset link sent to your email.
    </div>
  </div>
  <div class="accordion-item" data-accordion-item>
    <button class="accordion-trigger" type="button" data-accordion-trigger aria-expanded="false" data-state="closed">
      Can I change my subscription later?
      <svg class="demo-icon" data-slot="accordion-trigger-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
    </button>
    <div class="accordion-content demo-accordion-copy" data-accordion-content data-state="closed" hidden>
      Yes. Plan changes take effect at the next billing cycle unless you upgrade immediately.
    </div>
  </div>
  <div class="accordion-item" data-accordion-item>
    <button class="accordion-trigger" type="button" data-accordion-trigger aria-expanded="false" data-state="closed">
      Which payment methods are supported?
      <svg class="demo-icon" data-slot="accordion-trigger-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="m6 9 6 6 6-6" /></svg>
    </button>
    <div class="accordion-content demo-accordion-copy" data-accordion-content data-state="closed" hidden>
      Major credit cards, PayPal, and bank transfer are all supported.
    </div>
  </div>
</div>
