<div class="field-group">
  <div class="field field-orientation-horizontal" data-slot="field">
    <div class="field-content" data-slot="field-content">
      <label class="label field-label" for="html-switch-share"
        >Share across devices</label
      >
      <p class="field-description" data-slot="field-description">
        Enable syncing for your focus settings.
      </p>
    </div>
    <button
      id="html-switch-share"
      class="switch"
      type="button"
      role="switch"
      aria-checked="false"
      data-slot="switch"
      data-demo-switch
      data-size="default"
      data-state="unchecked"
    >
      <span
        class="switch-thumb"
        data-slot="switch-thumb"
        data-state="unchecked"
      ></span>
    </button>
  </div>
  <label class="label field-label" for="html-switch-notify">
    <div class="field field-orientation-horizontal" data-slot="field">
      <div class="field-content" data-slot="field-content">
        <div class="field-title" data-slot="field-title">
          Enable notifications
        </div>
        <p class="field-description" data-slot="field-description">
          Receive a message when the setting changes.
        </p>
      </div>
      <button
        id="html-switch-notify"
        class="switch"
        type="button"
        role="switch"
        aria-checked="true"
        data-slot="switch"
        data-demo-switch
        data-size="default"
        data-state="checked"
        data-checked
      >
        <span
          class="switch-thumb"
          data-slot="switch-thumb"
          data-state="checked"
        ></span>
      </button>
    </div>
  </label>
</div>
