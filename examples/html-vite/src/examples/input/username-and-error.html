<div class="field-group">
  <div class="field field-orientation-vertical" data-slot="field">
    <label class="label field-label" for="html-demo-username">Username</label>
    <input id="html-demo-username" class="input" type="text" placeholder="Max Leiter" />
    <p class="field-description" data-slot="field-description">Choose a unique username for your account.</p>
  </div>
  <div class="field field-orientation-vertical" data-slot="field" data-invalid="true">
    <label class="label field-label" for="html-demo-password">Password</label>
    <input id="html-demo-password" class="input" type="password" placeholder="••••••••" aria-invalid="true" />
    <p class="field-error" data-slot="field-error">Must be at least 8 characters long.</p>
  </div>
</div>
