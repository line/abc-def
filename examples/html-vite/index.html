<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>abc-def Plain HTML Example</title>
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body>
    <main class="demo-shell">
      <article class="card demo-card">
        <div class="card-header">
          <h1 class="card-title">Plain HTML with @abc-def/styles</h1>
          <p class="abc-text-dim">
            HTML uses the same explicit button variant and size classes as the
            framework wrappers.
          </p>
        </div>
        <div class="card-content">
          <label class="demo-field">
            <span class="demo-label">Email</span>
            <input
              class="input"
              type="email"
              autocomplete="email"
              placeholder="name@example.com"
            />
          </label>
          <div class="card-actions">
            <button class="btn btn-default" type="button">Default</button>
            <button class="btn btn-outline" type="button">Outline</button>
            <button class="btn btn-secondary" type="button">Secondary</button>
            <button class="btn btn-ghost" type="button">Ghost</button>
            <button class="btn btn-link" type="button">Link</button>
            <button class="btn btn-destructive" type="button">Delete</button>
          </div>
          <div class="card-actions">
            <button class="btn btn-default btn-sm" type="button">Small</button>
            <button class="btn btn-default" type="button">Default</button>
            <button class="btn btn-default btn-lg" type="button">Large</button>
            <button class="btn btn-default btn-icon" type="button" aria-label="Add item">
              +
            </button>
            <button class="btn btn-default btn-icon-sm" type="button" aria-label="Add small item">
              +
            </button>
            <button class="btn btn-default btn-icon-lg" type="button" aria-label="Add large item">
              +
            </button>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
