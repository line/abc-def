<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>abc-def Plain HTML Example</title>
    <link rel="stylesheet" href="/src/index.css" />
  </head>
  <body>
    <main class="demo-shell">
      <article class="card demo-card">
        <div class="card-header">
          <h1 class="card-title">Plain HTML with @abc-def/styles</h1>
          <p class="abc-text-dim">
            HTML uses the same explicit button variant and size classes as the
            framework wrappers.
          </p>
        </div>
        <div class="card-content">
          <label class="demo-field">
            <span class="demo-label">Email</span>
            <input
              class="input"
              type="email"
              autocomplete="email"
              placeholder="name@example.com"
            />
          </label>
          <div class="card-actions">
            <button
              class="button button-variant-default button-size-default"
              type="button"
            >
              Default
            </button>
            <button
              class="button button-variant-outline button-size-default"
              type="button"
            >
              Outline
            </button>
            <button
              class="button button-variant-ghost button-size-default"
              type="button"
            >
              Ghost
            </button>
            <button
              class="button button-variant-link button-size-default"
              type="button"
            >
              Link
            </button>
            <button
              class="button button-variant-destructive button-size-default"
              type="button"
            >
              Delete
            </button>
          </div>
          <div class="card-actions">
            <button
              class="button button-variant-default button-size-sm"
              type="button"
            >
              Small
            </button>
            <button
              class="button button-variant-default button-size-default"
              type="button"
            >
              Default
            </button>
            <button
              class="button button-variant-default button-size-lg"
              type="button"
            >
              Large
            </button>
            <button
              class="button button-variant-default button-icon"
              type="button"
              aria-label="Add item"
            >
              +
            </button>
            <button
              class="button button-variant-default button-icon-sm"
              type="button"
              aria-label="Add small item"
            >
              +
            </button>
            <button
              class="button button-variant-default button-icon-lg"
              type="button"
              aria-label="Add large item"
            >
              +
            </button>
          </div>
        </div>
      </article>
    </main>
  </body>
</html>
